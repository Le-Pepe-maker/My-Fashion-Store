<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Men | GGStore</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="navbar">
    <div class="logo">
      <a href="index.html"><img src="images/logo.jpg" width="125px" alt="GGStore Logo"></a>
    </div>
    <nav>
      <ul id="MenuItems">
        <li><a href="index.html">Home</a></li>
        <li><a href="product.html">Products</a></li>
        <li><a href="account.html">Account</a></li>
      </ul>
    </nav>
    <a href="cart.html"><img src="images/cart.jpg" width="50px" height="50px" alt="Cart Icon" style="mix-blend-mode: multiply;"></a>
    <img src="images/menu.jpg" width="50px" height="50px" class="menu-icon" alt="Menu" onclick="menutoggle()" style="mix-blend-mode: multiply;">
  </div>
</div>

<div class="small-container">
  <div class="row row-2">
    <h2>Men Items</h2>

      <img src="images/product-1.jpg" alt="Balenciaga Hoodie">

    </div>
    <div class="col-4">
      <img src="images/product-3.webp" alt="RICK OWENS SS26 TEMPLE PULL ON MEGA TRACTOR">
      <h4>RICK OWENS SS26 TEMPLE PULL ON MEGA TRACTOR</h4>
      <p>$1089.99</p>
      <button class="btn buy-btn" data-name="RICK OWENS SS26 TEMPLE PULL ON MEGA TRACTOR" data-price="1089.99" data-image="images/product-3.webp">Buy</button>
    </div>
  </div>
</div>
